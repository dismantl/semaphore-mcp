name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.6, 1.0.0, 1.0.0-beta.1)'
        required: true
        type: string
      release_type:
        description: 'Type of release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-and-publish
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release Request
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Error: releases must be dispatched from the main branch. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate version format
        run: |
          # Support: 1.0.0, 1.0.0-alpha.1, 1.0.0-beta.1, 1.0.0-rc.1
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "Error: Version must be in semver format (e.g., 1.0.0 or 1.0.0-beta.1)"
            exit 1
          fi

      - name: Check if version already exists
        run: |
          if git tag --list | grep -q "^v${{ inputs.version }}$"; then
            echo "Error: Version v${{ inputs.version }} already exists"
            exit 1
          fi

  preflight:
    name: Python Preflight (${{ matrix.python-version }})
    needs: [validate-release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Run ruff linter
        run: ruff check src tests

      - name: Run ruff formatter check
        run: ruff format --check src tests

      - name: Run mypy type checker
        run: mypy src --ignore-missing-imports --disable-error-code=import-untyped

      - name: Run unit tests with coverage
        run: pytest tests/ -v --ignore=tests/e2e --cov=src/semaphore_mcp --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Build package
        run: python -m build

      - name: Test built package installation
        run: |
          python -m venv test-env
          source test-env/bin/activate
          pip install dist/*.whl
          semaphore-mcp --help
          python -c "from semaphore_mcp import server; print('Import successful')"

  e2e-preflight:
    name: MCP E2E Preflight
    needs: [validate-release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Generate Semaphore credentials
        run: |
          PASSWORD=$(openssl rand -base64 16)
          echo "SEMAPHORE_ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "SEMAPHORE_ADMIN_NAME=admin" >> $GITHUB_ENV
          echo "SEMAPHORE_ADMIN_EMAIL=admin@localhost" >> $GITHUB_ENV
          echo "::add-mask::$PASSWORD"

      - name: Build Docker images
        run: docker compose -f docker-compose.test.yml build --no-cache

      - name: Start Semaphore container
        run: docker compose -f docker-compose.test.yml up -d semaphore

      - name: Wait for Semaphore to be ready
        run: |
          echo "Waiting for Semaphore to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/ping > /dev/null 2>&1; then
              echo "Semaphore is ready!"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

          echo "Semaphore did not become ready"
          docker compose -f docker-compose.test.yml logs semaphore
          exit 1

      - name: Generate Semaphore API token
        run: |
          COOKIE_FILE=$(mktemp)
          trap 'rm -f "$COOKIE_FILE"' EXIT

          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c "$COOKIE_FILE" -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"auth\": \"$SEMAPHORE_ADMIN_NAME\", \"password\": \"$SEMAPHORE_ADMIN_PASSWORD\"}")

          if [ "$LOGIN_STATUS" != "204" ]; then
            echo "Failed to login to Semaphore (HTTP $LOGIN_STATUS)"
            docker compose -f docker-compose.test.yml logs semaphore
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -s -b "$COOKIE_FILE" -X POST http://localhost:3000/api/user/tokens \
            -H "Content-Type: application/json")
          TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"id":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo "Failed to extract token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "SEMAPHORE_API_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "::add-mask::$TOKEN"
          echo "Token generated successfully"

      - name: Start MCP server container
        run: docker compose -f docker-compose.test.yml up -d semaphore-mcp

      - name: Wait for MCP server to be ready
        run: |
          echo "Waiting for MCP server to start..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" != "000" ]; then
              echo "MCP server is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

          echo "MCP server did not become ready"
          docker compose -f docker-compose.test.yml logs semaphore-mcp
          exit 1

      - name: Run E2E tests
        env:
          MCP_SERVER_URL: http://localhost:8000
          MCP_INSPECTOR_TIMEOUT: "120"
          npm_config_yes: "true"
        run: python3 -m pytest tests/e2e/ -v --tb=short

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Semaphore Logs ==="
          docker compose -f docker-compose.test.yml logs --tail=100 semaphore
          echo ""
          echo "=== MCP Server Logs ==="
          docker compose -f docker-compose.test.yml logs --tail=100 semaphore-mcp

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  release:
    needs: [preflight, e2e-preflight]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      release_tag: v${{ inputs.version }}
      previous_tag: ${{ steps.get_previous_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install toml

      - name: Validate version format
        run: |
          # Support: 1.0.0, 1.0.0-alpha.1, 1.0.0-beta.1, 1.0.0-rc.1
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "Error: Version must be in semver format (e.g., 1.0.0 or 1.0.0-beta.1)"
            exit 1
          fi

      - name: Check if version already exists
        run: |
          if git tag --list | grep -q "^v${{ inputs.version }}$"; then
            echo "Error: Version v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Get previous tag
        id: get_previous_tag
        env:
          CURRENT_VERSION: ${{ inputs.version }}
        run: |
          # Detect if current version is a stable release (no prerelease suffix)
          if [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version is a stable release, finding last stable tag..."
            # Find the last stable tag (exclude prerelease tags)
            PREVIOUS_TAG=$(git tag --list --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          else
            echo "Current version is a prerelease, finding last tag..."
            # For prereleases, use the most recent tag
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi
          echo "tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREVIOUS_TAG:-none}"

      - name: Update version in pyproject.toml
        run: |
          python -c "
          import toml

          # Read current pyproject.toml
          with open('pyproject.toml', 'r') as f:
              data = toml.load(f)

          # Update version
          current_version = data['project']['version']
          new_version = '${{ inputs.version }}'
          data['project']['version'] = new_version

          # Write back to file
          with open('pyproject.toml', 'w') as f:
              toml.dump(data, f)

          print(f'Updated version from {current_version} to {new_version}')
          "

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version change
        run: |
          git add pyproject.toml
          git commit -m "Bump version to ${{ inputs.version }}"

      - name: Push version commit
        run: |
          git push origin main

      - name: Create and push git tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

  build:
    name: Build distribution
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/semaphore-mcp
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build, publish-to-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/semaphore-mcp
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-container:
    name: Build and Push Container
    needs: [release, publish-to-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [release, build-container]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Generate Conventional Changelog
        id: changelog
        env:
          PREVIOUS_TAG: ${{ needs.release.outputs.previous_tag }}
          NEW_VERSION: ${{ inputs.version }}
        run: |
          # Initialize categories
          FEATURES=""
          FIXES=""
          DOCS=""
          CHORES=""
          BREAKING=""
          OTHER=""

          # Get commits since last tag
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Getting commits from ${PREVIOUS_TAG} to HEAD"
            COMMITS=$(git log --pretty=format:"%s|%h" ${PREVIOUS_TAG}..HEAD 2>/dev/null || echo "")
          else
            echo "No previous tag found, getting all commits"
            COMMITS=$(git log --pretty=format:"%s|%h" 2>/dev/null || echo "")
          fi

          # Parse each commit by prefix
          while IFS='|' read -r message hash; do
            [ -z "$message" ] && continue

            # Check for conventional commit prefixes
            if [[ "$message" =~ ^feat(\(.+\))?!?:\ (.+) ]]; then
              FEATURES="${FEATURES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^fix(\(.+\))?!?:\ (.+) ]]; then
              FIXES="${FIXES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^docs(\(.+\))?:\ (.+) ]]; then
              DOCS="${DOCS}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^chore(\(.+\))?:\ (.+) ]]; then
              CHORES="${CHORES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^refactor(\(.+\))?:\ (.+) ]]; then
              CHORES="${CHORES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^test(\(.+\))?:\ (.+) ]]; then
              CHORES="${CHORES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ ^ci(\(.+\))?:\ (.+) ]]; then
              CHORES="${CHORES}- ${BASH_REMATCH[2]} (\`${hash}\`)\n"
            elif [[ "$message" =~ BREAKING[[:space:]]CHANGE ]]; then
              BREAKING="${BREAKING}- ${message} (\`${hash}\`)\n"
            else
              OTHER="${OTHER}- ${message} (\`${hash}\`)\n"
            fi
          done <<< "$COMMITS"

          # Build changelog with non-empty sections
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$BREAKING" ]; then
            echo "### Breaking Changes" >> changelog.md
            echo -e "$BREAKING" >> changelog.md
          fi

          if [ -n "$FEATURES" ]; then
            echo "### Features" >> changelog.md
            echo -e "$FEATURES" >> changelog.md
          fi

          if [ -n "$FIXES" ]; then
            echo "### Bug Fixes" >> changelog.md
            echo -e "$FIXES" >> changelog.md
          fi

          if [ -n "$DOCS" ]; then
            echo "### Documentation" >> changelog.md
            echo -e "$DOCS" >> changelog.md
          fi

          if [ -n "$CHORES" ]; then
            echo "### Maintenance" >> changelog.md
            echo -e "$CHORES" >> changelog.md
          fi

          if [ -n "$OTHER" ]; then
            echo "### Other" >> changelog.md
            echo -e "$OTHER" >> changelog.md
          fi

          # If no categorized changes, add a fallback message
          if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$DOCS" ] && [ -z "$CHORES" ] && [ -z "$BREAKING" ] && [ -z "$OTHER" ]; then
            echo "No changes recorded." >> changelog.md
            echo "" >> changelog.md
          fi

      - name: Append Installation Info
        env:
          VERSION: ${{ inputs.version }}
          PREVIOUS_TAG: ${{ needs.release.outputs.previous_tag }}
        run: |
          cat >> changelog.md << EOF

          ---

          ## Installation

          ### Python Package
          \`\`\`bash
          pip install semaphore-mcp==${VERSION}
          \`\`\`
          [View on PyPI](https://pypi.org/project/semaphore-mcp/${VERSION}/)

          ### Container Image
          \`\`\`bash
          docker pull ghcr.io/cloin/semaphore-mcp:${VERSION}
          \`\`\`
          [View on GHCR](https://github.com/cloin/semaphore-mcp/pkgs/container/semaphore-mcp)

          ---

          EOF

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${VERSION}" >> changelog.md
          else
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/commits/v${VERSION}" >> changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body_path: changelog.md
          prerelease: ${{ inputs.prerelease }}
