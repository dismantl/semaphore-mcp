name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-publish-ref:
    name: Validate Publish Ref
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish ref
        run: |
          set -euo pipefail

          git fetch --no-tags origin main

          if [ "$GITHUB_REF_TYPE" = "branch" ]; then
            if [ "$GITHUB_REF_NAME" != "main" ]; then
              echo "Error: manual Docker publishing must run from main. Current ref: $GITHUB_REF_NAME"
              exit 1
            fi
            exit 0
          fi

          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "Error: Docker publishing only supports main or v* tags. Current ref type: $GITHUB_REF_TYPE"
            exit 1
          fi

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z]+\.[0-9]+)?$ ]]; then
            echo "Error: Docker release tags must use semver, for example v1.0.0 or v1.0.0-rc.1"
            exit 1
          fi

          TAG_COMMIT=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Error: Docker release tag $GITHUB_REF_NAME must point to a commit reachable from origin/main"
            exit 1
          fi

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    needs: validate-publish-ref

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff linter
        run: ruff check src tests

      - name: Run ruff formatter check
        run: ruff format --check src tests

      - name: Run mypy type checker
        run: mypy src --ignore-missing-imports --disable-error-code=import-untyped

  test:
    name: Unit Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/ -v --ignore=tests/e2e --cov=src/semaphore_mcp --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  package:
    name: Package Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Test built package installation
        run: |
          python -m venv test-env
          source test-env/bin/activate
          pip install dist/*.whl
          semaphore-mcp --help
          python -c "from semaphore_mcp import server; print('Import successful')"

  e2e-preflight:
    name: MCP E2E Preflight
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Generate Semaphore credentials
        run: |
          PASSWORD=$(openssl rand -base64 16)
          echo "SEMAPHORE_ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "SEMAPHORE_ADMIN_NAME=admin" >> $GITHUB_ENV
          echo "SEMAPHORE_ADMIN_EMAIL=admin@localhost" >> $GITHUB_ENV
          echo "::add-mask::$PASSWORD"

      - name: Build Docker images
        run: docker compose -f docker-compose.test.yml build --no-cache

      - name: Start Semaphore container
        run: docker compose -f docker-compose.test.yml up -d semaphore

      - name: Wait for Semaphore to be ready
        run: |
          echo "Waiting for Semaphore to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/ping > /dev/null 2>&1; then
              echo "Semaphore is ready!"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

          echo "Semaphore did not become ready"
          docker compose -f docker-compose.test.yml logs semaphore
          exit 1

      - name: Generate Semaphore API token
        run: |
          COOKIE_FILE=$(mktemp)
          trap 'rm -f "$COOKIE_FILE"' EXIT

          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c "$COOKIE_FILE" -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"auth\": \"$SEMAPHORE_ADMIN_NAME\", \"password\": \"$SEMAPHORE_ADMIN_PASSWORD\"}")

          if [ "$LOGIN_STATUS" != "204" ]; then
            echo "Failed to login to Semaphore (HTTP $LOGIN_STATUS)"
            docker compose -f docker-compose.test.yml logs semaphore
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -s -b "$COOKIE_FILE" -X POST http://localhost:3000/api/user/tokens \
            -H "Content-Type: application/json")
          TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"id":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo "Failed to extract token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "SEMAPHORE_API_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "::add-mask::$TOKEN"
          echo "Token generated successfully"

      - name: Start MCP server container
        run: docker compose -f docker-compose.test.yml up -d semaphore-mcp

      - name: Wait for MCP server to be ready
        run: |
          echo "Waiting for MCP server to start..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" != "000" ]; then
              echo "MCP server is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

          echo "MCP server did not become ready"
          docker compose -f docker-compose.test.yml logs semaphore-mcp
          exit 1

      - name: Run E2E tests
        env:
          MCP_SERVER_URL: http://localhost:8000
          MCP_INSPECTOR_TIMEOUT: "120"
          npm_config_yes: "true"
        run: python3 -m pytest tests/e2e/ -v --tb=short

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Semaphore Logs ==="
          docker compose -f docker-compose.test.yml logs --tail=100 semaphore
          echo ""
          echo "=== MCP Server Logs ==="
          docker compose -f docker-compose.test.yml logs --tail=100 semaphore-mcp

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: [package, e2e-preflight]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
